    if (full === t || full.indexOf(t) === 0) {
      match = true;
    } else if (city === t || (city.indexOf(t) === 0 && t.length >= 2)) {
      match = true;
    }

    if (match) {
      seen[full] = true;
      found.push({ label: pref + ' ' + city, count: count });
    }
  }

  var totalCount = found.reduce(function(sum, m) { return sum + m.count; }, 0);
  var res = document.getElementById('res');
  res.style.display = 'block';

  if (found.length) {
    res.className = 'result ok';
    res.innerHTML = '<p class="result-title">✓ 対象エリアです。' + totalCount + '社が対象となります</p>'
      + '<div class="tags">' + found.map(function(m) { return '<span class="tag">' + m.label + '（' + m.count + '社）</span>'; }).join('') + '</div>';
  } else {
    res.className = 'result ng';
    res.innerHTML = '<p class="result-title">✗ 対象エリア外です</p>'
      + '<p class="result-desc">「' + v + '」は対象エリアに含まれていません</p>';
  }
}

document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.isComposing) chk();
});
</script>
</body>
