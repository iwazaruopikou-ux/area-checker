<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

.sub { font-size: 14px; color: #888; margin-bottom: 24px; }

button:active { transform: scale(0.98); }
.hint { font-size: 12px; color: #aaa; margin-bottom: 24px; }
.result { border-radius: 12px; padding: 20px; display: none; }
.result.ok { background: #f0faf4; border: 1.5px solid #6dbd8a; }
.result.ng { background: #fff5f5; border: 1.5px solid #f87171; }
.result.partial { background: #fffbeb; border: 1.5px solid #fbbf24; }
.result-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.result.ok .result-title { color: #2d7a4a; }
.result.ng .result-title { color: #c0392b; }
.result.partial .result-title { color: #b45309; }
.result-desc { font-size: 14px; color: #555; margin-bottom: 12px; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 13px; padding: 4px 12px; border-radius: 20px; background: #e8f5ee; color: #2d7a4a; border: 1px solid #b2dfca; }
.tag-ng { background: #fef2f2; color: #c0392b; border-color: #fca5a5; }
</style>

function chk() {
  var v = document.getElementById('inp').value.trim();
  if (!v) return;
  var tokens = v.split(/[\s\n　、,，]+/).filter(function(t) { return t.trim(); });
  var ok = [], ng = [];

  for (var i = 0; i < tokens.length; i++) {
    var t = tokens[i].replace(/\s/g, '');

    if (found.length) {
      ok = ok.concat(found);
